# SPDX-License-Identifier: Apache-2.0
# Apache Virtual Host Configuration for MCP CESSDA Datasets Server
# Path: /cdc/v0.1.0
# Domain: mcp.cessda.eu

<VirtualHost *:80>
    ServerName mcp.cessda.eu

    # Redirect all HTTP to HTTPS
    Redirect permanent / https://mcp.cessda.eu/
</VirtualHost>

<VirtualHost *:443>
    ServerName mcp.cessda.eu
    ServerAdmin admin@cessda.eu

    # SSL Configuration (Let's Encrypt)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/mcp.cessda.eu/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/mcp.cessda.eu/privkey.pem

    # Modern SSL configuration
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLHonorCipherOrder on

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/mcp-cessda-error.log
    CustomLog ${APACHE_LOG_DIR}/mcp-cessda-access.log combined

    # Proxy settings - Enable required modules first:
    # sudo a2enmod proxy proxy_http proxy_wstunnel headers ssl
    ProxyPreserveHost On
    ProxyRequests Off

    # MCP Server at /cdc/v0.1.0
    <Location /cdc/v0.1.0>
        # Proxy to local MCP server
        ProxyPass http://localhost:8000 upgrade=websocket
        ProxyPassReverse http://localhost:8000

        # Set forwarding headers
        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-Forwarded-Port "443"
        RequestHeader set X-Forwarded-Prefix "/cdc/v0.1.0"

        # SSE-specific settings (disable buffering)
        Header set Cache-Control "no-cache, no-store, must-revalidate"
        Header set Connection "keep-alive"

        # Security headers
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-XSS-Protection "1; mode=block"
    </Location>

    # Optional: Basic Authentication
    # Uncomment and configure if needed
    # <Location /cdc/v0.1.0>
    #     AuthType Basic
    #     AuthName "MCP Server Access"
    #     AuthUserFile /etc/apache2/.htpasswd
    #     Require valid-user
    # </Location>
</VirtualHost>
